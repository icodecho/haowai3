name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Copy agconnect-services.json
        run: |
          mkdir -p app
          if [ -f doc/agconnect-services.json ]; then
            cp doc/agconnect-services.json app/agconnect-services.json
          fi

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle Wrapper
        run: |
          chmod +x ./gradlew || true
          if [ ! -f ./gradlew ] || ! java -cp gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain --version >/dev/null 2>&1; then
            echo "Generating fresh gradle wrapper..."
            mkdir -p gradle-download
            curl -L -o gradle-download/gradle-8.2-bin.zip https://services.gradle.org/distributions/gradle-8.2-bin.zip
            unzip -q gradle-download/gradle-8.2-bin.zip -d gradle-download/
            GRADLE_HOME=$(find gradle-download -maxdepth 1 -type d -name "gradle-*" | head -1)
            if [ -n "$GRADLE_HOME" ] && [ -d "$GRADLE_HOME" ]; then
              $GRADLE_HOME/bin/gradle wrapper --gradle-version 8.2
            fi
          fi

      - name: Build Release APK
        run: chmod +x ./gradlew && ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: haoWaiHaowai-release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Upload mapping file
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: haoWaiHaowai-mapping
          path: app/build/outputs/mapping/release/
